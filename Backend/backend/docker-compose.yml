services:
  guardaiian-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guardaiian-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://guardaiian:guardaiian@postgres:5432/guardaiian}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-./chroma_data}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_data
      - sqlite_data:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guardaiian
      POSTGRES_PASSWORD: guardaiian
      POSTGRES_DB: guardaiian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  chroma_data:
  sqlite_data:
  postgres_data:
